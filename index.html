<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean V-Taper Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans Thai', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#212529] min-h-screen flex justify-center">

    <div class="w-full max-w-md bg-white min-h-screen shadow-sm flex flex-col justify-between relative border-x border-gray-100">
        
        <header class="p-5 border-b border-gray-50 flex items-center justify-between sticky top-0 bg-white/80 backdrop-blur-md z-10">
            <div>
                <span class="text-xs font-semibold tracking-widest text-[#495057] uppercase">Workout Routine</span>
                <h1 class="text-xl font-bold tracking-tight text-[#212529] mt-0.5 flex items-center gap-1">
                    K-V TAPER <span class="text-blue-500 font-normal">▲</span>
                </h1>
            </div>
            <div class="bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100 flex items-center gap-1.5">
                <i data-lucide="dumbbell" class="w-3.5 h-3.5 text-gray-500"></i>
                <span class="text-xs font-medium text-gray-600">9.5 KG Fixed</span>
            </div>
        </header>

        <main class="p-5 flex-1 space-y-6 overflow-y-auto custom-scrollbar">
            
            <section class="bg-white rounded-2xl border border-gray-100 p-4 space-y-4">
                
                <div class="flex items-center justify-between">
                    <h2 class="text-sm font-semibold text-[#495057] flex items-center gap-2">
                        <i data-lucide="calendar" class="w-4 h-4 text-gray-400"></i> ปฏิทินตารางฝึก
                    </h2>
                    <div class="flex items-center gap-1 bg-gray-50 rounded-lg border border-gray-100 p-0.5">
                        <button id="prevMonthBtn" class="p-1 hover:bg-white rounded-md transition-all">
                            <i data-lucide="chevron-left" class="w-4 h-4 text-gray-600"></i>
                        </button>
                        <span id="currentMonthLabel" class="text-xs font-semibold text-gray-700 px-2 min-w-[90px] text-center">May 2026</span>
                        <button id="nextMonthBtn" class="p-1 hover:bg-white rounded-md transition-all">
                            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-600"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <div class="grid grid-cols-7 gap-1 text-center text-[11px] font-medium text-gray-400 mb-2">
                        <div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div>
                    </div>
                    <div id="calendarDays" class="grid grid-cols-7 gap-1.5 text-center">
                        </div>
                </div>

                <div class="flex flex-wrap items-center gap-y-1 gap-x-3 pt-2 border-t border-gray-50 text-[11px] text-gray-500">
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-50 border border-blue-200 inline-block"></span> อก + หลังแขน</div>
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-50 border border-emerald-200 inline-block"></span> หลัง + หน้าแขน</div>
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-purple-50 border border-purple-200 inline-block"></span> ไหล่ + ขา</div>
                    <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-50 border border-gray-200 inline-block"></span> Rest Day</div>
                </div>
            </section>

            <section class="space-y-3">
                <div class="flex items-center justify-between px-1">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-gray-400">โปรแกรมสำหรับวันที่เลือก</h2>
                    <span id="selectedDateText" class="text-xs font-medium text-blue-600">วันนี้</span>
                </div>

                <div id="workoutDetails" class="space-y-3">
                    </div>
            </section>
        </main>

        <footer class="p-4 bg-gray-50 border-t border-gray-100 rounded-b-2xl">
            <div class="flex items-center justify-between text-xs text-gray-500">
                <span class="flex items-center gap-1"><i data-lucide="egg" class="w-3.5 h-3.5"></i> อกไก่ 400g</span>
                <span class="flex items-center gap-1"><i data-lucide="soup" class="w-3.5 h-3.5"></i> มื้อเย็น: ไข่น้ำวากาเมะ</span>
                <span class="flex items-center gap-1"><i data-lucide="cup-soda" class="w-3.5 h-3.5"></i> เวย์ 1 Scoop</span>
            </div>
        </footer>
    </div>

    <script>
        // ใช้จุดเริ่มลูปเดิม: 16 พ.ค. 2026 เป็นจุดอ้างอิง Day 1 (อก+หลังแขน) เพื่อความแม่นยำระยะยาว
        const baseDate = new Date(2026, 4, 16); 

        const routines = {
            0: {
                title: "Day 1: อกผึ่งสไตล์ V-Taper + หลังแขน",
                colorClass: "bg-blue-50 border-blue-200 text-blue-700",
                dotClass: "bg-blue-500",
                exercises: [
                    { name: "Dumbbell Chest Press", detail: "9.5 kg | 4 เซต x 10-12 ครั้ง (บีบสะบักแน่น)" },
                    { name: "Dumbbell Fly (กางอกกว้าง)", detail: "7 kg | 3 เซต x 12 ครั้ง (เน้นยืดกรอบอก)" },
                    { name: "Dumbbell Floor Press", detail: "9.5 kg | 3 เซต x 10-12 ครั้ง (ศอกแตะพื้นระเบิดแรง)" },
                    { name: "Bench Dips", detail: "น้ำหนักตัว | 3 เซต x 15-20 ครั้ง" },
                    { name: "Abs Finish Combo", detail: "Plank 60วิ + Bicycle Crunches 20ครั้ง x 3 เซต" }
                ]
            },
            1: {
                title: "Day 2: หลังกว้าง V-Taper + หน้าแขน",
                colorClass: "bg-emerald-50 border-emerald-200 text-emerald-700",
                dotClass: "bg-emerald-500",
                exercises: [
                    { name: "Dumbbell Row (มุมเปิดกว้าง)", detail: "9.5 kg | 4 เซต x 10-12 ครั้ง (ศอกกางเล็กน้อยยืดปีก)" },
                    { name: "Straight-Arm Pullover", detail: "9.5 kg (ดัมเบลเดี่ยว) | 3 เซต x 12 ครั้ง (ท่ายืดปีกหลัก)" },
                    { name: "Dumbbell Curls", detail: "7 หรือ 9.5 kg | 3 เซต x 10-12 ครั้ง" },
                    { name: "Hammer Curls", detail: "7 หรือ 9.5 kg | 3 เซต x 10-12 ครั้ง (ล็อกศอกนิ่ง)" },
                    { name: "Abs Finish Combo", detail: "Plank 60วิ + Bicycle Crunches 20ครั้ง x 3 เซต" }
                ]
            },
            2: {
                title: "Day 3: ไหล่ไอดอลเกาหลี + ขากระชับ",
                colorClass: "bg-purple-50 border-purple-200 text-purple-700",
                dotClass: "bg-purple-500",
                exercises: [
                    { name: "Dumbbell Lateral Raise (ทีละข้าง)", detail: "7 kg | จัดหนัก 5 เซต x 12-15 ครั้ง (มือจับเสาล็อกตัว)" },
                    { name: "Dumbbell Overhead Press", detail: "9.5 kg | 3 เซต x 10-12 ครั้ง (ห้ามใช้แรงขาเหวี่ยง)" },
                    { name: "Dumbbell Squats", detail: "9.5 kg | 3 เซต x 12-15 ครั้ง (สปีดปานกลางเน้นคาร์ดิโอ)" },
                    { name: "Bodyweight Lunges / Plank เพิ่ม", detail: "เน้นกระชับช่วงล่าง ไม่เพิ่มมวลกล้ามเนื้อขา" },
                    { name: "Abs Finish Combo", detail: "Plank 60-90วิ + Bicycle Crunches 20ครั้ง x 3 เซต" }
                ]
            },
            3: {
                title: "Day 4: วันพักผ่อน (Rest Day) 💤",
                colorClass: "bg-gray-50 border-gray-200 text-gray-500",
                dotClass: "bg-gray-400",
                exercises: [
                    { name: "กล้ามเนื้อพักฟื้นและซ่อมแซม", detail: "งดเวทเทรนนิ่ง นอนหลับให้เต็มอิ่ม" },
                    { name: "คาร์ดิโอเบาๆ (ถ้าต้องการ)", detail: "เดินเล่น 20-30 นาที (สะสมให้ใกล้ 10,000 ก้าว)" },
                    { name: "Calorie Deficit Focus", detail: "มื้อเย็นเน้นผักกาดขาว + วากาเมะนึ่ง เพื่อรีดพุงและโซเดียม" }
                ]
            }
        };

        // สถานะของปฏิทินปัจจุบัน (ดึงเวลาจริงของระบบ)
        const today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth(); // 0 = ม.ค., 5 = มิ.ย.

        const monthNamesTH = [
            "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", 
            "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
        ];

        function getRoutineIndex(date) {
            // เคลียร์เศษเวลาให้เหลือแค่ระดับวันเพื่อความแม่นยำในการลบ
            const d1 = Date.UTC(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
            const d2 = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
            
            const diffDays = Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
            
            if (diffDays < 0) {
                return ((diffDays % 4) + 4) % 4;
            }
            return diffDays % 4;
        }

        function renderCalendar(year, month) {
            const calendarDaysContainer = document.getElementById('calendarDays');
            calendarDaysContainer.innerHTML = ''; // ล้างค่าเก่าเวลาเปลี่ยนเดือน

            // อัปเดตป้ายชื่อเดือนและปี (พ.ศ.)
            document.getElementById('currentMonthLabel').innerText = `${monthNamesTH[month]} ${year + 543}`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // 1. เติมช่องว่างของวันก่อนหน้าวันที่ 1 ของเดือนนั้นๆ
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyDiv = document.createElement('div');
                calendarDaysContainer.appendChild(emptyDiv);
            }

            // 2. รันสร้างปุ่มวันในเดือน
            for (let day = 1; day <= daysInMonth; day++) {
                const currentGridDate = new Date(year, month, day);
                const loopIndex = getRoutineIndex(currentGridDate);
                const dayRoutine = routines[loopIndex];

                const dayButton = document.createElement('button');
                dayButton.className = `p-2 rounded-xl text-xs font-semibold flex flex-col items-center justify-between border min-h-[52px] transition-all relative ${dayRoutine.colorClass}`;
                
                // ตรวจสอบว่าเป็น "วันนี้ตัวจริง" บนปฏิทินหรือไม่
                const isRealToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                if (isRealToday) {
                    dayButton.classList.add('ring-2', 'ring-black', 'ring-offset-1');
                }

                dayButton.innerHTML = `
                    <span>${day}</span>
                    <span class="w-1.5 h-1.5 rounded-full ${dayRoutine.dotClass} mt-1"></span>
                `;

                // อีเวนต์เวลาจิ้มวันต่างๆ
                dayButton.addEventListener('click', () => {
                    document.querySelectorAll('#calendarDays button').forEach(b => b.classList.remove('border-black', 'scale-95'));
                    dayButton.classList.add('border-black');
                    showWorkoutDetails(currentGridDate, dayRoutine);
                });

                calendarDaysContainer.appendChild(dayButton);

                // ดึงข้อมูลแสดงผลเริ่มต้น (ถ้าอยู่ในเดือนปัจจุบัน ให้โชว์ของวันนี้เลย ถ้าเป็นเดือนอื่นให้โชว์ของวันที่ 1 เสมอ)
                if (isRealToday) {
                    showWorkoutDetails(currentGridDate, dayRoutine);
                } else if (day === 1 && !isCurrentMonthShowingToday()) {
                    showWorkoutDetails(currentGridDate, dayRoutine);
                }
            }
        }

        function isCurrentMonthShowingToday() {
            return currentMonth === today.getMonth() && currentYear === today.getFullYear();
        }

        function showWorkoutDetails(date, routine) {
            document.getElementById('selectedDateText').innerText = date.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'short' });
            
            const detailsContainer = document.getElementById('workoutDetails');
            detailsContainer.innerHTML = `
                <div class="p-4 rounded-xl border border-gray-100 bg-white space-y-3">
                    <div class="font-bold text-sm text-[#212529] pb-2 border-b border-gray-50 flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full ${routine.dotClass}"></span>
                        ${routine.title}
                    </div>
                    <div class="space-y-3.5">
                        ${routine.exercises.map(ex => `
                            <div class="flex flex-col">
                                <span class="text-xs font-semibold text-[#495057]">${ex.name}</span>
                                <span class="text-[11px] text-gray-400 mt-0.5">${ex.detail}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // ปุ่มควบคุมคลิกเปลี่ยนเดือน
        document.getElementById('prevMonthBtn').addEventListener('click', () => {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar(currentYear, currentMonth);
        });

        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar(currentYear, currentMonth);
        });

        // เปิดหน้าเว็บมาให้รันเลย
        renderCalendar(currentYear, currentMonth);
        lucide.createIcons();
    </script>
</body>
</html>
